<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Light Clock Ground Frame</title>

<style>

body{
  margin:0;
  background:#0a0c10;
  color:white;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.scene{
  position:relative;
  width:600px;
  height:400px;
  border:1px solid #333;
  overflow:hidden;
}

.train{
  position:absolute;
  left:100px;
  top:50%;
  transform:translateY(-50%);
  width:200px;
  height:260px;
  border:1px solid #666;
}

.mirror{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:120px;
  height:6px;
  background:white;
}

.mirror.top{ top:10px; }
.mirror.bottom{ bottom:10px; }

.light{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#4fc3f7;
  box-shadow:0 0 12px #4fc3f7;
  transform:translate(-50%,-50%);
}

</style>
</head>

<body>

<div class="scene">

  <div class="train">
    <div class="mirror top"></div>
    <div class="mirror bottom"></div>
    <div class="light" id="light"></div>
  </div>

</div>

<script>

const light = document.getElementById("light");

const TRAIN_TOP = 30;
const TRAIN_BOTTOM = 230;

let x = 100;        // horizontal motion
let y = TRAIN_TOP;
let vy = 2;         // vertical velocity
let vx = 2;         // horizontal velocity (diagonal right)

function animate(){

  x += vx;
  y += vy;

  // bounce vertically between mirrors
  if(y <= TRAIN_TOP){
    y = TRAIN_TOP;
    vy = Math.abs(vy);
  }

  if(y >= TRAIN_BOTTOM){
    y = TRAIN_BOTTOM;
    vy = -Math.abs(vy);
  }

  light.style.left = x + "px";
  light.style.top = y + "px";

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
